<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Race Year</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f4f1;
      --cell-empty: #eceae6;
      --cell-default: #e3e1dc;
      --text: #1a1a1a;
      --text-dim: #777;
      --text-faint: #aaa;
      --border: #ddd;
      --today-ring: #e63946;

      --c-tremblant: #2196f3;
      --c-nespresso: #e8811a;
      --c-hyrox: #2e9e5a;
      --c-sail: #d63384;
      --c-beirut: #7c4dff;

      --c-base: #bbdefb;
      --c-build: #90caf9;
      --c-peak: #42a5f5;
      --c-taper: #c8e6c9;

      --cell-size: 22px;
      --cell-gap: 2px;
    }

    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
    }

    .page {
      width: 100%;
      max-width: 860px;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 3rem;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1;
    }

    header h1 span {
      color: var(--text-faint);
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: block;
      margin-top: 0.3rem;
    }

    /* ── Year Grid ── */
    .year-grid {
      display: flex;
      gap: 0;
      overflow-x: auto;
      padding-bottom: 0.5rem;
    }

    .month-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .month-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 6px;
      height: 18px;
      display: flex;
      align-items: center;
    }

    .month-label.has-today { color: var(--today-ring); }

    .month-days {
      display: flex;
      flex-direction: column;
      gap: var(--cell-gap);
      width: 100%;
      align-items: center;
    }

    .day {
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: 4px;
      background: var(--cell-default);
      position: relative;
      cursor: default;
      transition: transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
    }

    .day:hover {
      transform: scale(1.4);
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .day:hover::after {
      content: attr(data-label);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 20;
    }

    .day.empty {
      background: transparent;
      pointer-events: none;
    }

    .day.today {
      box-shadow: inset 0 0 0 2px var(--today-ring);
      z-index: 5;
    }

    .day.race {
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      z-index: 6;
    }

    .day.race:hover {
      transform: scale(1.6);
    }

    .day.race.potential-race {
      background: transparent !important;
      border: 2px dashed;
    }

    .day.race::before {
      content: attr(data-short);
      position: absolute;
      font-size: 0.38rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .day.race.potential-race::before {
      color: inherit;
    }

    /* Day number row headers */
    .day-nums {
      display: flex;
      flex-direction: column;
      gap: var(--cell-gap);
      margin-right: 6px;
      padding-top: 24px;
    }

    .day-num {
      height: var(--cell-size);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: 0.55rem;
      color: var(--text-faint);
      font-weight: 500;
      width: 16px;
    }

    .day-num.dim { color: transparent; }

    /* ── Legend ── */
    .legend-wrap {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.2rem;
      align-items: center;
    }

    .legend-label {
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      width: 80px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.68rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    .legend-swatch.circle {
      border-radius: 50%;
    }

    .legend-swatch.dashed {
      background: transparent !important;
      border: 1.5px dashed;
    }

    @media (max-width: 700px) {
      :root {
        --cell-size: 18px;
        --cell-gap: 1.5px;
      }
      body { padding: 1.5rem 0.5rem 2rem; }
      header h1 { font-size: 2.2rem; }
      .day-nums { margin-right: 3px; }
      .day-num { font-size: 0.48rem; width: 12px; }
      .month-label { font-size: 0.55rem; }
    }

    @media (max-width: 480px) {
      :root {
        --cell-size: 14px;
        --cell-gap: 1px;
      }
      header h1 { font-size: 1.8rem; }
      .month-label { font-size: 0.48rem; letter-spacing: 0.04em; }
      .legend-wrap { gap: 0.5rem; }
      .legend-label { width: 60px; font-size: 0.5rem; }
      .legend-item { font-size: 0.58rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>2026 <span>Race Year</span></h1>
    </header>
    <div class="year-grid" id="grid"></div>
    <div class="legend-wrap" id="legend"></div>
  </div>

  <script>
    const YEAR = 2026;
    const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];

    const events = [
      {
        id: 'tremblant', name: 'Ironman 70.3 Tremblant', short: '70.3',
        raceDate: '2026-06-21', color: '#2196f3', potential: false,
        location: 'Mont-Tremblant, QC', type: '70.3 Triathlon',
        phases: [
          { name: 'Base',  start: '2026-01-21', end: '2026-04-12', color: 'var(--c-base)' },
          { name: 'Build', start: '2026-04-13', end: '2026-05-31', color: 'var(--c-build)' },
          { name: 'Peak',  start: '2026-06-01', end: '2026-06-14', color: 'var(--c-peak)' },
          { name: 'Taper', start: '2026-06-15', end: '2026-06-20', color: 'var(--c-taper)' },
        ]
      },
      {
        id: 'nespresso', name: '21K Nespresso', short: '21K',
        raceDate: '2026-04-19', color: '#e8811a', potential: false,
        location: 'Parc Jean-Drapeau', type: 'Half Marathon',
        training: { start: '2026-01-26', end: '2026-04-18' }
      },
      {
        id: 'hyrox', name: 'Hyrox Ottawa', short: 'HYR',
        raceDate: '2026-05-14', color: '#2e9e5a', potential: false,
        location: 'EY Centre, Ottawa', type: 'Hyrox',
        training: { start: '2026-03-02', end: '2026-05-13' }
      },
      {
        id: 'sail', name: 'SAIL Esprit', short: 'SAIL',
        raceDate: '2026-09-12', color: '#d63384', potential: false,
        location: 'Parc Jean-Drapeau', type: 'Olympic Tri',
        training: { start: '2026-07-06', end: '2026-09-11' }
      },
      {
        id: 'beirut', name: 'Beirut Marathon', short: 'BEI',
        raceDate: '2026-11-29', color: '#7c4dff', potential: true,
        location: 'Beirut, Lebanon', type: 'Marathon',
        training: { start: '2026-07-27', end: '2026-11-28' }
      },
    ];

    function ds(m, d) {
      return `${YEAR}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function parseD(s) { return new Date(s + 'T00:00:00'); }

    function inRange(d, start, end) { return d >= start && d <= end; }

    function fmtDate(s) {
      return parseD(s).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    // Build date map
    const today = new Date();
    const todayStr = ds(today.getMonth(), today.getDate());
    const todayMonth = today.getMonth();

    const dateMap = {};
    for (let m = 0; m < 12; m++) {
      for (let d = 1; d <= DAYS_IN_MONTH[m]; d++) {
        const key = ds(m, d);
        dateMap[key] = { bg: null, labels: [], isRace: false, raceEv: null, isToday: key === todayStr };
      }
    }

    // Fill phases (70.3)
    events.forEach(ev => {
      if (ev.phases) {
        ev.phases.forEach(phase => {
          let cur = parseD(phase.start);
          const end = parseD(phase.end);
          while (cur <= end) {
            const key = ds(cur.getMonth(), cur.getDate());
            if (dateMap[key]) {
              dateMap[key].bg = phase.color;
              dateMap[key].labels.push(`${ev.short} ${phase.name}`);
            }
            cur.setDate(cur.getDate() + 1);
          }
        });
      }

      // Training (non-70.3)
      if (ev.training) {
        let cur = parseD(ev.training.start);
        const end = parseD(ev.training.end);
        while (cur <= end) {
          const key = ds(cur.getMonth(), cur.getDate());
          if (dateMap[key]) {
            // Don't overwrite 70.3 phase colors; layer underneath
            if (!dateMap[key].bg) {
              dateMap[key].bg = hexAlpha(ev.color, ev.potential ? 0.08 : 0.14);
            }
            dateMap[key].labels.push(`${ev.name} training`);
          }
          cur.setDate(cur.getDate() + 1);
        }
      }

      // Race day
      if (dateMap[ev.raceDate]) {
        dateMap[ev.raceDate].isRace = true;
        dateMap[ev.raceDate].raceEv = ev;
        dateMap[ev.raceDate].labels.unshift(`🏁 ${ev.name} — ${fmtDate(ev.raceDate)}`);
      }
    });

    function hexAlpha(hex, a) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function renderGrid() {
      const grid = document.getElementById('grid');

      // Day number column
      const numCol = document.createElement('div');
      numCol.className = 'day-nums';
      for (let d = 1; d <= 31; d++) {
        const num = document.createElement('div');
        num.className = 'day-num' + (d % 5 !== 1 && d !== 1 ? ' dim' : '');
        num.textContent = d;
        numCol.appendChild(num);
      }
      grid.appendChild(numCol);

      // Month columns
      for (let m = 0; m < 12; m++) {
        const col = document.createElement('div');
        col.className = 'month-col';

        const label = document.createElement('div');
        label.className = 'month-label' + (m === todayMonth ? ' has-today' : '');
        label.textContent = MONTHS_SHORT[m];
        col.appendChild(label);

        const days = document.createElement('div');
        days.className = 'month-days';

        for (let d = 1; d <= 31; d++) {
          const cell = document.createElement('div');

          if (d > DAYS_IN_MONTH[m]) {
            cell.className = 'day empty';
          } else {
            const key = ds(m, d);
            const info = dateMap[key];
            cell.className = 'day';

            // Background color
            if (info.bg) {
              cell.style.background = info.bg;
            }

            // Race day
            if (info.isRace) {
              cell.classList.add('race');
              cell.style.background = info.raceEv.color;
              cell.setAttribute('data-short', info.raceEv.short);
              if (info.raceEv.potential) {
                cell.classList.add('potential-race');
                cell.style.background = 'transparent';
                cell.style.borderColor = info.raceEv.color;
                cell.style.color = info.raceEv.color;
              }
            }

            // Today
            if (info.isToday) cell.classList.add('today');

            // Hover label
            const labelParts = [`${MONTHS_SHORT[m]} ${d}`];
            if (info.labels.length) labelParts.push(info.labels[0]);
            cell.setAttribute('data-label', labelParts.join(' · '));
          }

          days.appendChild(cell);
        }

        col.appendChild(days);
        grid.appendChild(col);
      }
    }

    function renderLegend() {
      const el = document.getElementById('legend');

      // 70.3 phases
      el.innerHTML = `
        <div class="legend-row">
          <div class="legend-label">70.3 Phases</div>
          <div class="legend-item"><div class="legend-swatch" style="background:var(--c-base)"></div>Base</div>
          <div class="legend-item"><div class="legend-swatch" style="background:var(--c-build)"></div>Build</div>
          <div class="legend-item"><div class="legend-swatch" style="background:var(--c-peak)"></div>Peak</div>
          <div class="legend-item"><div class="legend-swatch" style="background:var(--c-taper)"></div>Taper</div>
        </div>
        <div class="legend-row">
          <div class="legend-label">Race Days</div>
          ${events.map(ev => `
            <div class="legend-item">
              <div class="legend-swatch circle ${ev.potential ? 'dashed' : ''}" style="background:${ev.color};${ev.potential ? 'border-color:'+ev.color+';background:transparent' : ''}"></div>
              ${ev.name} · ${fmtDate(ev.raceDate)}
            </div>
          `).join('')}
        </div>
      `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderGrid();
      renderLegend();
    });
  </script>
</body>
</html>

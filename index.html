<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Race Year</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fff;
      --surface: #fff;
      --cell: #f0f0f2;
      --text: #1a1a1e;
      --text-mid: #6b6b76;
      --text-dim: #b0b0b8;
      --line: #e8e8ec;
      --today: #e03040;
      --label-w: 38px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 40px;
      gap: 24px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      width: 100%;
      max-width: 1800px;
    }

    header h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      letter-spacing: -0.01em;
    }

    header h1 em {
      font-style: normal;
      font-weight: 600;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-left: 8px;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .lg {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text-mid);
    }

    .lg .d {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .lg .d.dashed {
      background: transparent !important;
      border: 1.5px dashed;
    }

    .lg .tbc { font-size: 0.5rem; color: var(--text-dim); font-weight: 500; }

    /* ── Grid ── */
    .grid-wrap {
      width: 100%;
      max-width: 1800px;
    }

    .year-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Day numbers header */
    .dhdr {
      display: flex;
      height: 22px;
      flex-shrink: 0;
      margin-bottom: 4px;
    }

    .dhdr .sp { width: var(--label-w); flex-shrink: 0; }

    .dhdr .nums {
      display: grid;
      grid-template-columns: repeat(31, 1fr);
      gap: 6px;
      flex: 1;
    }

    .dn {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      font-size: 0.5rem;
      font-weight: 600;
      color: var(--text-dim);
      padding-bottom: 2px;
    }

    .dn.vis { color: var(--text-mid); }
    .dn:not(.vis) { visibility: hidden; }

    .dn.td-col {
      color: var(--today) !important;
      visibility: visible !important;
      font-weight: 800;
    }

    /* Month rows */
    .mr {
      display: flex;
      gap: 0;
    }

    .ml {
      width: var(--label-w);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
    }

    .ml.now { color: var(--today); font-weight: 800; }

    .md {
      display: grid;
      grid-template-columns: repeat(31, 1fr);
      gap: 6px;
      flex: 1;
    }

    /* ── Cells ── */
    .c {
      aspect-ratio: 1;
      background: var(--cell);
      border-radius: 4px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      cursor: default;
    }

    .c:hover { z-index: 10; filter: brightness(0.92); }
    .c.x { background: transparent; pointer-events: none; }
    .c.past { opacity: 0.45; }
    .c.past:hover { opacity: 0.75; }

    /* Today */
    .c.today {
      z-index: 8;
      opacity: 1 !important;
      box-shadow: 0 0 0 3.5px var(--today);
    }

    /* Overlap splits */
    .c.o2 { background: none !important; overflow: hidden; }
    .c.o2 .h { position: absolute; left: 0; right: 0; height: 50%; border-radius: 0; }
    .c.o2 .h:first-child { top: 0; border-radius: 3px 3px 0 0; }
    .c.o2 .h:last-child { bottom: 0; border-radius: 0 0 3px 3px; }

    .c.o3 { background: none !important; overflow: hidden; }
    .c.o3 .h { position: absolute; left: 0; right: 0; height: 33.33%; border-radius: 0; }
    .c.o3 .h:nth-child(1) { top: 0; border-radius: 3px 3px 0 0; }
    .c.o3 .h:nth-child(2) { top: 33.33%; }
    .c.o3 .h:nth-child(3) { bottom: 0; border-radius: 0 0 3px 3px; }

    /* Race badge */
    .c.race {
      overflow: visible;
      z-index: 15;
      opacity: 1 !important;
    }

    .b {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 16;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .b span {
      font-size: 0.44rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .b.pot {
      background: var(--surface) !important;
      border: 2px dashed;
      box-shadow: none;
    }

    .b.pot span { color: inherit; }

    .c.race:hover .b {
      transform: translate(-50%, -50%) scale(1.12);
      transition: transform 0.12s;
    }

    /* Tooltip */
    .tip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 0.68rem;
      padding: 8px 12px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      opacity: 0;
      transition: opacity 0.1s;
      max-width: 260px;
    }

    .tip.on { opacity: 1; }

    .tip-date {
      font-size: 0.54rem;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .tip-ev {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      font-weight: 500;
      line-height: 1.3;
    }

    .tip-ev .td {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tip-rn { font-weight: 700; font-size: 0.7rem; }
    .tip-m { font-size: 0.54rem; color: var(--text-dim); margin-top: 1px; }

    /* Responsive */
    @media (max-width: 700px) {
      :root { --label-w: 28px; }
      body { padding: 20px; }
      .ml { font-size: 0.52rem; padding-right: 6px; }
      .b { width: 20px; height: 20px; }
      .b span { font-size: 0.28rem; }
    }

    @media (max-width: 500px) {
      :root { --label-w: 22px; }
      body { padding: 14px; gap: 14px; }
      header h1 { font-size: 1rem; }
      header h1 em { display: none; }
      .lg .tbc { display: none; }
      .ml { font-size: 0.44rem; padding-right: 4px; }
      .dn { font-size: 0.36rem; }
      .b { width: 15px; height: 15px; }
      .b span { font-size: 0.22rem; }
    }

    @media (hover: none) {
      .c:hover { filter: none; }
      .c.race:hover .b { transform: translate(-50%, -50%); }
    }
  </style>
</head>
<body>
  <header>
    <h1>2026<em>Race Year</em></h1>
    <div class="legend" id="legend"></div>
  </header>
  <div class="grid-wrap">
    <div class="year-grid" id="grid"></div>
    <div class="tip" id="tip"></div>
  </div>

  <script>
    const YEAR = 2026;
    const MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DIM = [31,28,31,30,31,30,31,31,30,31,30,31];
    const WDAY = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    const events = [
      {
        id: '703', name: 'Ironman 70.3 Tremblant', short: '70.3',
        raceDate: '2026-06-21', hex: '#1a8a9a', potential: false,
        location: 'Mont-Tremblant, QC', type: '70.3 Triathlon',
        phases: [
          { name: 'Base',  start: '2026-01-21', end: '2026-04-12' },
          { name: 'Build', start: '2026-04-13', end: '2026-05-31' },
          { name: 'Peak',  start: '2026-06-01', end: '2026-06-14' },
          { name: 'Taper', start: '2026-06-15', end: '2026-06-20' },
        ]
      },
      {
        id: '21k', name: '21K Nespresso', short: '21K',
        raceDate: '2026-04-19', hex: '#e86b5a', potential: false,
        location: 'Parc Jean-Drapeau', type: 'Half Marathon',
        training: { start: '2026-01-26', end: '2026-04-18' }
      },
      {
        id: 'hyr', name: 'Hyrox Ottawa', short: 'HYR',
        raceDate: '2026-05-14', hex: '#c45e10', potential: false,
        location: 'EY Centre, Ottawa', type: 'Hyrox',
        training: { start: '2026-03-02', end: '2026-05-13' }
      },
      {
        id: 'sail', name: 'SAIL Esprit', short: 'SAIL',
        raceDate: '2026-09-12', hex: '#d63060', potential: false,
        location: 'Parc Jean-Drapeau', type: 'Olympic Tri',
        training: { start: '2026-07-06', end: '2026-09-11' }
      },
      {
        id: 'bei', name: 'Beirut Marathon', short: 'BEI',
        raceDate: '2026-11-29', hex: '#8860d0', potential: true,
        location: 'Beirut, Lebanon', type: 'Marathon',
        training: { start: '2026-09-01', end: '2026-11-28' }
      },
    ];

    // Training fill = event hex so colors match exactly
    events.forEach(ev => {
      if (ev.phases) ev.phases.forEach(ph => { ph.fill = ev.hex; });
      if (ev.training) ev.trainingFill = ev.hex;
    });

    function ds(m, d) {
      return `${YEAR}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
    function parseD(s) { return new Date(s + 'T00:00:00'); }

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const isCurrentYear = today.getFullYear() === YEAR;
    const todayStr = isCurrentYear ? ds(today.getMonth(), today.getDate()) : '';
    const todayMonth = isCurrentYear ? today.getMonth() : -1;
    const todayDay = isCurrentYear ? today.getDate() : -1;

    const dateMap = {};
    for (let m = 0; m < 12; m++) {
      for (let d = 1; d <= DIM[m]; d++) {
        const key = ds(m, d);
        const cd = parseD(key);
        dateMap[key] = {
          layers: [],
          races: [],
          isToday: key === todayStr,
          isPast: isCurrentYear ? cd < today : today.getFullYear() > YEAR,
          tips: []
        };
      }
    }

    events.forEach(ev => {
      const end = parseD(ev.raceDate);

      if (ev.phases) {
        ev.phases.forEach(ph => {
          let cur = parseD(ph.start);
          const pe = parseD(ph.end);
          while (cur <= pe) {
            const key = ds(cur.getMonth(), cur.getDate());
            if (dateMap[key]) {
              dateMap[key].layers.push({ fill: ph.fill, accent: ev.hex, id: ev.id, end });
              dateMap[key].tips.push({ color: ev.hex, text: `${ev.short} ${ph.name}` });
            }
            cur.setDate(cur.getDate() + 1);
          }
        });
      }

      if (ev.training) {
        let cur = parseD(ev.training.start);
        const te = parseD(ev.training.end);
        while (cur <= te) {
          const key = ds(cur.getMonth(), cur.getDate());
          if (dateMap[key]) {
            dateMap[key].layers.push({ fill: ev.trainingFill, accent: ev.hex, id: ev.id, end });
            dateMap[key].tips.push({ color: ev.hex, text: `${ev.short} Training` });
          }
          cur.setDate(cur.getDate() + 1);
        }
      }

      if (dateMap[ev.raceDate]) {
        dateMap[ev.raceDate].races.push(ev);
        dateMap[ev.raceDate].tips.unshift({
          color: ev.hex, text: ev.name, bold: true,
          meta: `${ev.type} · ${ev.location}`
        });
      }
    });

    Object.values(dateMap).forEach(i => i.layers.sort((a, b) => a.end - b.end));

    function renderGrid() {
      const grid = document.getElementById('grid');

      // Day header
      const hdr = document.createElement('div');
      hdr.className = 'dhdr';
      const sp = document.createElement('div');
      sp.className = 'sp';
      hdr.appendChild(sp);
      const nums = document.createElement('div');
      nums.className = 'nums';
      const show = new Set([1, 5, 10, 15, 20, 25, 31]);
      for (let d = 1; d <= 31; d++) {
        const n = document.createElement('div');
        n.className = 'dn';
        if (show.has(d)) n.classList.add('vis');
        if (d === todayDay && todayMonth >= 0) n.classList.add('td-col');
        n.textContent = d;
        nums.appendChild(n);
      }
      hdr.appendChild(nums);
      grid.appendChild(hdr);

      for (let m = 0; m < 12; m++) {
        const row = document.createElement('div');
        row.className = 'mr';

        const lbl = document.createElement('div');
        lbl.className = 'ml' + (m === todayMonth ? ' now' : '');
        lbl.textContent = MO[m];
        row.appendChild(lbl);

        const days = document.createElement('div');
        days.className = 'md';

        for (let d = 1; d <= 31; d++) {
          const el = document.createElement('div');
          if (d > DIM[m]) {
            el.className = 'c x';
          } else {
            const key = ds(m, d);
            const info = dateMap[key];
            el.className = 'c';
            el.setAttribute('data-key', key);
            if (info.isPast) el.classList.add('past');
            if (info.isToday) el.classList.add('today');

            // Deduplicate layers by event id
            const byId = new Map();
            for (const l of info.layers) {
              if (!byId.has(l.id)) byId.set(l.id, l);
            }

            if (info.races.length > 0) {
              el.classList.add('race');
              el.style.background = 'transparent';
              const ev = info.races[0];
              const b = document.createElement('div');
              b.className = 'b' + (ev.potential ? ' pot' : '');
              b.style.background = ev.hex;
              if (ev.potential) {
                b.style.borderColor = ev.hex;
                b.style.color = ev.hex;
              }
              b.innerHTML = `<span>${ev.short}</span>`;
              el.appendChild(b);
            } else {
              const u = [...byId.values()].sort((a, b) => (a.end || 0) - (b.end || 0));
              if (u.length === 1) {
                el.style.background = u[0].fill;
              } else if (u.length === 2) {
                el.classList.add('o2');
                u.forEach(l => {
                  const h = document.createElement('div');
                  h.className = 'h';
                  h.style.background = l.fill;
                  el.appendChild(h);
                });
              } else if (u.length >= 3) {
                el.classList.add('o3');
                u.slice(0, 3).forEach(l => {
                  const h = document.createElement('div');
                  h.className = 'h';
                  h.style.background = l.fill;
                  el.appendChild(h);
                });
              }
            }
          }
          days.appendChild(el);
        }
        row.appendChild(days);
        grid.appendChild(row);
      }
    }

    function renderLegend() {
      const el = document.getElementById('legend');
      el.innerHTML = events.map(ev =>
        `<div class="lg">
          <div class="d ${ev.potential ? 'dashed' : ''}" style="background:${ev.hex};${ev.potential ? 'border-color:'+ev.hex+';background:transparent' : ''}"></div>
          <span>${ev.short}</span>
          ${ev.potential ? '<span class="tbc">tbc</span>' : ''}
        </div>`
      ).join('');
    }

    function setupTooltips() {
      const tip = document.getElementById('tip');
      const grid = document.getElementById('grid');
      let active = null;
      const isTouch = 'ontouchstart' in window;

      function show(cell) {
        const key = cell.getAttribute('data-key');
        if (!key) return;
        const info = dateMap[key];
        if (!info) return;
        active = cell;
        const [,ms,ds2] = key.split('-');
        const m = parseInt(ms) - 1, d = parseInt(ds2);
        const dt = new Date(YEAR, m, d);

        let html = `<div class="tip-date">${WDAY[dt.getDay()]}, ${MO[m]} ${d}</div>`;
        if (!info.tips.length) {
          html += `<div class="tip-ev" style="color:var(--text-dim)">Rest day</div>`;
        } else {
          info.tips.forEach(p => {
            html += `<div class="tip-ev"><div class="td" style="background:${p.color}"></div>`;
            if (p.bold) {
              html += `<div><div class="tip-rn" style="color:${p.color}">${p.text}</div>`;
              if (p.meta) html += `<div class="tip-m">${p.meta}</div>`;
              html += `</div>`;
            } else {
              html += `<span>${p.text}</span>`;
            }
            html += `</div>`;
          });
        }
        tip.innerHTML = html;
        tip.classList.add('on');
        const r = cell.getBoundingClientRect();
        const tr = tip.getBoundingClientRect();
        let left = r.left + r.width / 2 - tr.width / 2;
        let top = r.top - tr.height - 10;
        if (left < 4) left = 4;
        if (left + tr.width > window.innerWidth - 4) left = window.innerWidth - tr.width - 4;
        if (top < 4) top = r.bottom + 10;
        tip.style.left = left + 'px';
        tip.style.top = top + 'px';
      }

      function hide() { active = null; tip.classList.remove('on'); }

      if (isTouch) {
        grid.addEventListener('touchstart', e => {
          const cell = e.target.closest('.c:not(.x)');
          if (cell) { e.preventDefault(); active === cell ? hide() : show(cell); }
          else hide();
        }, { passive: false });
        document.addEventListener('touchstart', e => {
          if (!e.target.closest('.year-grid') && !e.target.closest('.tip')) hide();
        });
      } else {
        grid.addEventListener('mouseover', e => {
          const cell = e.target.closest('.c:not(.x)');
          if (cell) show(cell);
        });
        grid.addEventListener('mouseout', e => { if (e.target.closest('.c')) hide(); });
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderGrid();
      renderLegend();
      setupTooltips();
    });
  </script>
</body>
</html>
